# Project-local cargo-audit policy.
# Keeps CI strict while documenting known upstream advisories.

[advisories]
ignore = [
  "RUSTSEC-2022-0061", # parity-wasm (transitive in polkadot-sdk)
  "RUSTSEC-2024-0370", # proc-macro-error (transitive in polkadot-sdk)
  "RUSTSEC-2024-0388", # derivative (transitive in polkadot-sdk)
  "RUSTSEC-2024-0436", # paste (transitive in polkadot-sdk)
  "RUSTSEC-2025-0009", # ring via rcgen/libp2p in polkadot-sdk dependency graph
  "RUSTSEC-2025-0055", # tracing-subscriber via ark* / revm-precompile in polkadot-sdk
  "RUSTSEC-2025-0057", # tonic denial-of-service issue via polkadot-sdk transitives
  "RUSTSEC-2025-0010", # ring CPU DoS advisory via polkadot-sdk transitives
  "RUSTSEC-2025-0118", # wasmtime shared-memory API issue via polkadot-sdk transitives
  "RUSTSEC-2026-0002", # wasmtime panic in memory refill via polkadot-sdk transitives
  "RUSTSEC-2026-0006", # wasmtime x86-64 codegen issue via polkadot-sdk transitives
  "RUSTSEC-2026-0020", # wasmtime i31ref/f64 lane issue via polkadot-sdk transitives
  "RUSTSEC-2026-0021", # wasmtime via sc-executor-wasmtime in polkadot-sdk
  "RUSTSEC-2024-0384", # instant crate unmaintained (transitive in polkadot-sdk)
  "RUSTSEC-2026-0012", # keccak unsound opt-in ARM backend (transitive)
]

[output]
deny = ["warnings"]
quiet = false

[yanked]
enabled = false
update_index = true
